<nav>

    <!-- LOGO -->
    <div class="logo">
        <a href="{% url 'home' %}">ShopSphere</a>
    </div>

    <!-- HAMBURGER -->
    <div class="menu-toggle" onclick="toggleMenu()">
        ☰
    </div>

    {% if request.user.is_authenticated and not profile_nav %}

    <!-- SEARCH -->
    <form action="{% url 'home' %}" method="GET" class="search-bar">

        <input type="text" name="q" placeholder="Search products">

        <button type="submit" name="trending" value="1">
            Trending
        </button>

        <button type="submit" name="offer" value="1">
            Offers
        </button>

    </form>

    {% endif %}

    <!-- NAV LINKS -->
    <div class="nav-links" id="mobileMenu">

        {% if request.user.is_authenticated %}

            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'support' %}">Support</a>
            <a href="{% url 'cart' %}">
                Cart ({{ cartproductscount|default:0 }})
            </a>
            <a href="{% url 'profile' %}">Profile</a>
            <a href="{% url 'knowus' %}">Know Us</a>
            <a href="{% url 'logout_' %}">Logout</a>

        {% else %}

            <a href="{% url 'login_' %}">Login</a>
            <a href="{% url 'register' %}" class="register-btn">Register</a>

        {% endif %}

    </div>

</nav>

<script>
function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("show-menu");
}
</script>
